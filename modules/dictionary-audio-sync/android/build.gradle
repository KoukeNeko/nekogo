plugins {
  id 'com.android.library'
  id 'expo-module-gradle-plugin'
}

group = 'expo.modules.dictionaryaudiosync'
version = '0.1.0'

android {
  namespace "expo.modules.dictionaryaudiosync"
  defaultConfig {
    versionCode 1
    versionName "0.1.0"
  }
  lintOptions {
    abortOnError false
  }
}

dependencies {
  implementation 'androidx.work:work-runtime-ktx:2.10.1'
  implementation 'androidx.core:core-ktx:1.17.0'
}
